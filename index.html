<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tonypu 🤍</title>
    <link rel="stylesheet" href="style.css?v=20260713-2">
</head>

<body>
    <button class="back-home" id="backHomeButton" aria-label="Volver a la página principal" title="Volver a la página principal">
        <span>♡</span>
    </button>

    <section class="hero" id="hero">
        <h1>Hola Amor Mío</h1>
        <p>Hice esta página solo para nosotros.</p>

        <div class="home-nav" aria-label="Secciones rápidas">
            <button class="home-nav-btn" id="openLetterButton" aria-label="Ir al buzón de cartas">💌</button>
            <button class="home-nav-btn" id="openGameButton" aria-label="Ir al mini juego">💞</button>
        </div>
        <div class="countdown-card" id="countdownCard">
            <h3>Llevamos juntos</h3>
            <div class="countdown" id="countdown"></div>
        </div>
    </section>

    <section class="letter-panel" id="galleryPanel" aria-hidden="true">
        <div class="sparkles-layer" id="sparklesLayer" aria-hidden="true"></div>
        <div class="mailbox-frame">
            <div class="mailbox-header">
                <h2>Buzón de Cartas 💌</h2>
                <p>Todo lo que siento por ti en palabras.</p>
            </div>
            <div class="letter-paper">
                <p class="letter-date typing-text" data-text="12 de julio, 2026"></p>
                <p class="letter-line typing-text" data-text="Querido Tonypu,"></p>
                <p class="letter-line typing-text" data-text="Quiero que sepas que estoy agradecido por todo lo que hemos logrado juntos. Sé que nunca seremos perfectos, pero quiero que sigamos creciendo juntos."></p>
                <p class="letter-line typing-text" data-text="He sido testigo de todo lo que has mejorado y de la persona en la que te has convertido. Estoy muy orgulloso de ti."></p>
                <p class="letter-line typing-text" data-text="Gracias por existir y por llenar de amor mis días, porque sé que me amas aunque no sea en el mismo lenguaje. Sé que seguiremos mejorando juntos."></p>
                <p class="letter-line typing-text" data-text="Siempre voy a cuidar este sentimiento tan bonito que compartimos. Por eso, en esta página dedicada solo para ti, encontrarás cosas bonitas sobre nosotros solo para que siempre me lleves contigo."></p>
                <p class="letter-sign typing-text" data-text="Con todo mi amor,"></p>
                <p class="letter-sign typing-text" data-text="Yadzel Adrián"></p>
            </div>
        </div>
        <button class="next-page-btn" id="nextPageButton" aria-label="Siguiente" title="Siguiente">
            <span>→</span>
        </button>
    </section>

    <section class="game-panel" id="gamePanel" aria-hidden="true">
        <div class="game-card">
            <h2>Mini juego 💖</h2>
            <p>Haz click en los corazones para hacerlos brillar.</p>
            <div class="game-area" id="gameArea"></div>
            <button class="back-to-home" id="backToHomeButton">Volver</button>
        </div>
    </section>

    <script src="script.js?v=20260713-2"></script>
</body>

</html>
